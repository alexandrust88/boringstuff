apiVersion: v1
kind: ConfigMap
metadata:
  name: wwwz-viewer-config
  labels:
    app.kubernetes.io/name: wwwz
    app.kubernetes.io/component: viewer
data:
  nginx.conf: |
    server {
        listen 8080;
        server_name _;

        root /usr/share/nginx/html/output;
        index index.html;
        autoindex off;

        auth_basic "wwwz";
        auth_basic_user_file /etc/nginx/htpasswd;

        location = /healthz {
            auth_basic off;
            access_log off;
            default_type text/plain;
            return 200 "ok\n";
        }

        location / {
            try_files $uri $uri/ =404;
        }

        location /files/ {
            alias /usr/share/nginx/html/output/;
            autoindex on;
            autoindex_exact_size off;
            autoindex_localtime on;
        }
    }
