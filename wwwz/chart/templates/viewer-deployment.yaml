apiVersion: apps/v1
kind: Deployment
metadata:
  name: wwwz-viewer
  labels:
    app.kubernetes.io/name: wwwz
    app.kubernetes.io/component: viewer
spec:
  # PVC is ReadWriteOnce - do not scale > 1 unless storageClass is RWX
  replicas: 1
  revisionHistoryLimit: 3
  progressDeadlineSeconds: 120
  selector:
    matchLabels:
      app.kubernetes.io/name: wwwz
      app.kubernetes.io/component: viewer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wwwz
        app.kubernetes.io/component: viewer
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx
          image: "{{ .Values.image.viewer.repository }}:{{ .Values.image.viewer.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: output
              mountPath: /usr/share/nginx/html/output
              readOnly: true
            - name: viewer-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
            - name: viewer-auth
              mountPath: /etc/nginx/htpasswd
              subPath: htpasswd
              readOnly: true
            - name: cache
              mountPath: /var/cache/nginx
            - name: tmp
              mountPath: /tmp
            - name: run
              mountPath: /var/run
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
      volumes:
        - name: output
          persistentVolumeClaim:
            claimName: wwwz-output
        - name: viewer-config
          configMap:
            name: wwwz-viewer-config
        - name: viewer-auth
          secret:
            secretName: wwwz-viewer-auth
        - name: cache
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: run
          emptyDir: {}
