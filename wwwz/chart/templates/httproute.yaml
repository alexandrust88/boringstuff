{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: wwwz-viewer
  labels:
    app.kubernetes.io/name: wwwz
    app.kubernetes.io/component: viewer
spec:
  parentRefs:
    - name: {{ .Values.gateway.parentRef.name | quote }}
      namespace: {{ .Values.gateway.parentRef.namespace | quote }}
  hostnames:
    - {{ .Values.hostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: wwwz-viewer
          port: 80
{{- end }}
