apiVersion: batch/v1
kind: CronJob
metadata:
  name: wwwz-report
  labels:
    app.kubernetes.io/name: wwwz
    app.kubernetes.io/component: report
spec:
  schedule: {{ .Values.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 3600
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: wwwz
            app.kubernetes.io/component: report
        spec:
          restartPolicy: OnFailure
          serviceAccountName: wwwz
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            fsGroup: 10001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: report
              image: "{{ .Values.image.report.repository }}:{{ .Values.image.report.tag }}"
              imagePullPolicy: IfNotPresent
              args:
                {{- if .Values.clusterFilter }}
                - "--cluster"
                - {{ .Values.clusterFilter | quote }}
                {{- end }}
                {{- if gt (int .Values.maxClusters) 0 }}
                - "--max-clusters"
                - {{ .Values.maxClusters | quote }}
                {{- end }}
              envFrom:
                - secretRef:
                    name: wwwz-wiz
              env:
                - name: OUTPUT_DIR
                  value: "/output"
                - name: WIZ_AUTH_URL
                  value: {{ .Values.wiz.authUrl | quote }}
                - name: WIZ_API_URL
                  value: {{ .Values.wiz.apiUrl | quote }}
                - name: MAX_WORKERS
                  value: "5"
              volumeMounts:
                - name: output
                  mountPath: /output
                - name: tmp
                  mountPath: /tmp
              securityContext:
                runAsNonRoot: true
                runAsUser: 10001
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
                seccompProfile:
                  type: RuntimeDefault
              resources:
                requests:
                  cpu: 200m
                  memory: 256Mi
                limits:
                  cpu: 1000m
                  memory: 1Gi
          volumes:
            - name: output
              persistentVolumeClaim:
                claimName: wwwz-output
            - name: tmp
              emptyDir: {}
