{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wwwz-viewer
  labels:
    app.kubernetes.io/name: wwwz
    app.kubernetes.io/component: viewer
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  tls:
    - hosts:
        - {{ .Values.hostname | quote }}
      secretName: {{ .Values.tlsSecretName | quote }}
  rules:
    - host: {{ .Values.hostname | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wwwz-viewer
                port:
                  number: 80
{{- end }}
